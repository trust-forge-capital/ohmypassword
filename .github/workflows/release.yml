name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.VERSION }}
          GITCOMMIT: ${{ github.sha }}
        run: |
          ext="${{ matrix.ext }}"
          BUILDTIME=$(date -u +%Y-%m-%d_%H:%M:%S)
          go build -ldflags='-s -w -X github.com/trust-forge-capital/ohmypassword/cmd/cli.version=$VERSION -X github.com/trust-forge-capital/ohmypassword/cmd/cli.buildTime=$BUILDTIME -X github.com/trust-forge-capital/ohmypassword/cmd/cli.gitCommit=$GITCOMMIT' -o bin/ohmypassword-${GOOS}-${GOARCH}${ext} ./cmd/ohmypassword

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bin/ohmypassword-*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run tests
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  release:
    needs: [build, test, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get previous tag
        id: prevtag
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v1.0.0")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "CHANGELOG_URL=https://github.com/trust-forge-capital/ohmypassword/compare/$PREV_TAG...${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/ohmypassword-*
          generate_release_notes: false
          body: |
            ## What's New in ${{ github.ref_name }}

            ### Bug Fixes
            - Fix CI: Upgrade golangci-lint to v2.11 format

            ### Previous v1.1.0 Features
            - **i18n Enhancement**: Full translation support for help text, error messages, strength levels
            - **Table Output**: New `-o table` format using go-pretty/v6
            - **Validation Fixes**: 
              - Passphrase word count validation (4-10 words)
              - Output format validation
              - Quiet mode for JSON/CSV output

            ### Downloads
            - `ohmypassword-darwin-amd64` / `ohmypassword-darwin-arm64`
            - `ohmypassword-linux-amd64` / `ohmypassword-linux-arm64`  
            - `ohmypassword-windows-amd64.exe` / `ohmypassword-windows-arm64`

            **Full Changelog**: ${{ steps.prevtag.outputs.CHANGELOG_URL }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}